name: run-bot

on:
  workflow_dispatch:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

concurrency:
  group: paper-trading-bot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure output folder exists
        run: mkdir -p output

      - name: Check required plan file
        run: test -f output/paper_trading_plan.json || (echo "Missing output/paper_trading_plan.json" && exit 1)

      - name: Run integration manager
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u integration_manager.py